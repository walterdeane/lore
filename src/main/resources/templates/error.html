<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">

    <h1><span th:text="${status}">500</span> &mdash; <span th:text="${error}">Error</span></h1>
    <p class="flash flash-error" th:if="${message != null and not #strings.isEmpty(message)}" th:text="${message}">
        Something went wrong.
    </p>
    <p><a class="btn btn-secondary" th:href="@{/}">Return home</a></p>

</div>
</body>
</html>
