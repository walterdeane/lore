<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Documents</title>
</head>
<body>
<div layout:fragment="content">

    <nav th:replace="~{fragments/domain-nav :: nav(${domain.id})}"></nav>

    <p th:if="${message}" class="flash flash-success" th:text="${message}">Success message</p>
    <p th:if="${error}" class="flash flash-error" th:text="${error}">Error message</p>

    <h1><span th:text="${domain.name}">Domain Name</span> Domain Documents</h1>
    <section class="card" style="margin-bottom: 1.5rem;">
        <h2>Add a document</h2>
        <form th:action="@{/domains/{id}/documents(id=${domain.id})}" method="post" class="document-form"  enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Title" required>
            <input type="text" name="author" placeholder="Author">
                    <select name="tags" multiple>
                        <option th:each="tag : ${availableTags}"
                                th:value="${tag.path}"
                                th:text="${tag.name}">
                        </option>
                    </select>
            <select name="chunkStrategy">
                <option value="">Chunking strategy (inherit from domain)</option>
                <option th:each="s : ${strategies}" th:value="${s}" th:text="${s}"></option>
            </select>
            <select name="structuralVariant">
                <option value="">Structural variant (inherit from domain)</option>
                <option th:each="v : ${variants}" th:value="${v}" th:text="${v}"></option>
            </select>
            <input type="file" name="file" />
            <button type="submit" class="btn">Add document</button>
        </form>

        <h3>Add a new tag</h3>
        <form th:action="@{/domains/{id}/tags(id=${domain.id})}" method="post" class="tag-form">
            <select name="parentPath">
                <option value="">— root level —</option>
                <option th:each="tag : ${availableTags}"
                        th:value="${tag.path}"
                        th:text="${tag.path} + ' (' + ${tag.name} + ')'">
                </option>
            </select>
            <input type="text" name="name" placeholder="New tag name" required>
            <input type="text" name="description" placeholder="Description">
            <button type="submit" class="btn btn-secondary">Add tag</button>
        </form>
    </section>

    <form th:action="@{/domains/{id}/documents(id=${domain.id})}" method="get" class="document-form" style="margin-bottom: 1.5rem;">
        <input type="text" name="q" placeholder="Search documents" th:value="${query}">
        <button type="submit" class="btn btn-secondary">Search</button>
    </form>

    <section class="card-grid">
        <div class="card" th:each="document : ${documentsPage.content}">
            <h3 th:text="${document.title}">Document name</h3>
            <p class="text-dim" th:text="${document.author}">Author</p>
            <div class="document-actions">
                <a class="btn btn-secondary"
                   th:href="@{/domains/{id}/documents/{documentId}(id=${domain.id}, documentId=${document.id})}">
                    View document
                </a>
            </div>
            <form th:action="@{/domains/{id}/documents/{documentId}(id=${domain.id}, documentId=${document.id})}"
                  method="post" class="delete-form">
                <input type="hidden" name="_method" value="delete">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </section>

    <p th:if="${documentsPage.content.isEmpty()}" class="text-dim">No documents found.</p>

    <nav class="pager" th:if="${documentsPage.totalPages > 1}">
        <a th:if="${documentsPage.hasPrevious()}"
           th:href="@{/domains/{id}/documents(id=${domain.id}, page=${documentsPage.number - 1}, q=${query})}"
           class="btn btn-secondary">&larr; Previous</a>
        <span class="text-dim">Page <span th:text="${documentsPage.number + 1}">1</span> of <span th:text="${documentsPage.totalPages}">1</span></span>
        <a th:if="${documentsPage.hasNext()}"
           th:href="@{/domains/{id}/documents(id=${domain.id}, page=${documentsPage.number + 1}, q=${query})}"
           class="btn btn-secondary">Next &rarr;</a>
    </nav>

    <script>
    (function () {
        function syncVariant(strategySelect) {
            var form = strategySelect.closest('form');
            var variantSelect = form && form.querySelector('select[name="structuralVariant"]');
            if (!variantSelect) return;
            variantSelect.disabled = strategySelect.value !== 'STRUCTURAL';
        }
        document.querySelectorAll('select[name="chunkStrategy"]').forEach(function (sel) {
            syncVariant(sel);
            sel.addEventListener('change', function () { syncVariant(sel); });
        });

        function fillTitleFromFilename(fileInput) {
            var form = fileInput.closest('form');
            var titleInput = form && form.querySelector('input[name="title"]');
            var file = fileInput.files && fileInput.files[0];
            if (!titleInput || !file || titleInput.value.trim() !== '') return;
            var name = file.name;
            var dot = name.lastIndexOf('.');
            titleInput.value = dot > 0 ? name.slice(0, dot) : name;
        }
        document.querySelectorAll('input[type="file"][name="file"]').forEach(function (fileInput) {
            fileInput.addEventListener('change', function () { fillTitleFromFilename(fileInput); });
        });
    }());
    </script>

</div>
</body>
</html>
