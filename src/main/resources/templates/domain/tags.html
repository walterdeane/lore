<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Tags</title>
</head>
<body>
<div layout:fragment="content">

    <nav th:replace="~{fragments/domain-nav :: nav(${domain.id})}"></nav>

    <p th:if="${message}" class="flash flash-success" th:text="${message}">Success message</p>
    <p th:if="${error}" class="flash flash-error" th:text="${error}">Error message</p>

    <h1 th:text="${domain.name} + ' Tags'">Tags</h1>
    <p class="text-dim">Hierarchical tags for this domain.</p>

    <section class="card" style="margin-bottom: 1.5rem;">
        <h2>Add a tag</h2>
        <form th:action="@{/domains/{id}/tags(id=${domain.id})}" method="post" class="tag-form">
            <select name="parentPath">
                <option value="">— root level —</option>
                <option th:each="tag : ${availableTags}"
                        th:value="${tag.path}"
                        th:text="${tag.path} + ' (' + ${tag.name} + ')'">
                </option>
            </select>
            <input type="text" name="name" placeholder="Tag name" required>
            <input type="text" name="description" placeholder="Description">
            <button type="submit" class="btn">Add tag</button>
        </form>
    </section>

    <form th:action="@{/domains/{id}/tags(id=${domain.id})}" method="get" class="tag-form" style="margin-bottom: 1.5rem;">
        <input type="text" name="q" placeholder="Search tags" th:value="${query}">
        <button type="submit" class="btn btn-secondary">Search</button>
    </form>

    <table class="tags-table" th:if="${not tagTree.isEmpty()}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Path</th>
            <th>Description</th>
            <th class="tags-table-actions">Actions</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="rootNode : ${tagTree}">
            <tr th:replace="~{fragments/tag-row :: tagRow(${domain.id}, ${rootNode}, 0, '')}"></tr>
        </th:block>
        </tbody>
    </table>

    <p th:if="${tagTree.isEmpty()}" class="text-dim">No tags found.</p>

</div>
</body>
</html>
