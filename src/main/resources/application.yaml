spring:
  application:
    name: lore
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  ai:
    ollama:
      embedding:
        model: nomic-embed-text

lore:
  storage:
    documents-dir: ${LORE_DOCS_DIR:${LORE_DATA_DIR:${user.home}/lore-data}/documents}
  chunking:
    default-strategy: TOKEN
